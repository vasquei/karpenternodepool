apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: my-nodepool-ondemand
spec:
  template:
    spec:
      expireAfter: Never
      nodeClassRef:
        group: oci.oraclecloud.com
        kind: OCINodeClass
        name: my-ocinodeclass

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64

        - key: kubernetes.io/os
          operator: In
          values:
            - linux

        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand

        - key: karpenter.k8s.oracle/instance-shape-name
          operator: In
          values:
            - VM.Standard.E3.Flex
            - VM.Standard.E4.Flex
            - VM.Standard.E5.Flex

      terminationGracePeriod: 2m

  disruption:
    budgets:
      - nodes: "20%"
        reasons: ["Empty"]
      - nodes: "10%"
        reasons: ["Underutilized"]
      - nodes: "5%"
        reasons: ["Drifted"]
        schedule: "@daily"
        duration: 10m
    consolidateAfter: 1m
    consolidationPolicy: WhenEmptyOrUnderutilized

  limits:
    cpu: 64
    memory: 256Gi