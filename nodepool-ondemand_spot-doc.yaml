apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: my-nodepool-mixed
spec:
  template:
    spec:
      expireAfter: Never
      nodeClassRef:
        group: oci.oraclecloud.com
        kind: OCINodeClass
        name: my-ocinodeclass

      taints:
        - key: oci.oraclecloud.com/oke-is-preemptible
          value: present
          effect: NoSchedule  
          
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
            - spot

        - key: karpenter.k8s.oracle/instance-shape-name
          operator: In
          values:
            - VM.Standard.E3.Flex
            - VM.Standard.E4.Flex
            - VM.Standard.E5.Flex

      terminationGracePeriod: 2m

  disruption:
    budgets:
      # Permite eliminar nodos vacíos rápidamente
      - nodes: "20%"
        reasons: ["Empty"]
      - nodes: "10%"
        reasons: ["Underutilized"]
      - nodes: "5%"
        reasons:
          - Drifted
        schedule: "@daily"
        duration: 10m
    consolidateAfter: 1m
    consolidationPolicy: WhenEmptyOrUnderutilized

  limits:
    cpu: 64
    memory: 256Gi