apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-big-9gi-6-ocpu
  namespace: arg-wkshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karpenter-big-9gi-6-ocpu
  template:
    metadata:
      labels:
        app: karpenter-big-9gi-6-ocpu
    spec:
      tolerations:
        - key: "oci.oraclecloud.com/oke-is-preemptible"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: karpenter-big-9gi-6-ocpu
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "9000m"
              memory: "12Gi"